name: Qodana Code Analysis

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  qodana-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write
      security-events: write
    
    env:
      # Node.js uyarılarını susturma emri
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Qodana Scan
        # Sürümü daha stabil ve yeni bir versiyona güncelledik
        uses: jetbrains/qodana-action@v2024.1
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_CONFIGURATIONS_TOKEN }}
        with:
          # 400 Önbellek hatasını engeller
          use-caches: false
          # Qodana hata bulsa bile sistemi çökertmesini (Exit Code 1) engeller
          args: --fail-threshold,99999
